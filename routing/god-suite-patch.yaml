apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-suite-patch
  description: Coordinated change across multiple repos
  tier: 0

prerequisites:
  required:
    - .godpowers/suite/suite.yaml

execution:
  spawns: [god-coordinator]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-suite-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-suite-patch
  events: [agent.start, agent.end]
