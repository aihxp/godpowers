apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-dogfood
  description: Run messy-repo dogfood scenarios for release and autonomy readiness.
  tier: 0

prerequisites:
  required: []

execution:
  spawns:
    - built-in
  secondary-spawns:
    - god-greenfieldifier
    - god-context-writer
    - god-coordinator
  context: current
  writes: []

success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-repair
  auto-spawn:
    - god-greenfieldifier
    - god-context-writer
    - god-coordinator

endoff:
  state-update: none
  events:
    - agent.start
    - agent.end
