apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-review
  description: Two-stage code review
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [god-spec-reviewer]
  context: fresh
  secondary-spawns: [god-quality-reviewer]
  writes:
    []


success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-review
  events: [agent.start, artifact.created, agent.end]
