apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-version
  description: Print installed version + capability summary
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-help

failure-path:
  on-error: /god-doctor

endoff:
  state-update: none
  events: [agent.start, agent.end]
