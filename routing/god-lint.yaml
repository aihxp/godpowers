apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-lint
  description: Mechanical have-nots validation
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-next

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-lint
  events: [agent.start, agent.end]
