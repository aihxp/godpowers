apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-stories
  description: List STORY.md files grouped by status
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-story-build

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-stories
  events: [agent.start, agent.end]
