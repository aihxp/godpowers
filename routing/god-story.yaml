apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-story
  description: Write new STORY.md (fine-grained slice)
  tier: 1

prerequisites:
  required: []

execution:
  spawns: [god-storyteller]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-story-build

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-1 updated for /god-story
  events: [agent.start, agent.end]
