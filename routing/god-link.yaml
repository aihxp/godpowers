apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-link
  description: Manually add/remove a code-artifact link
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-scan

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-link
  events: [agent.start, agent.end]
