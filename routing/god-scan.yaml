apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-scan
  description: Full reverse-sync of the codebase
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-review-changes

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-scan
  events: [agent.start, agent.end]
