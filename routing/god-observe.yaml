apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-observe
  description: Wire observability
  tier: 3

prerequisites:
  required:
    - check: state:tier-3.deploy.status == done
      auto-complete: /god-deploy
      human-required: true

execution:
  spawns: [god-observability-engineer]
  context: fresh
  writes:
    - .godpowers/observe/STATE.md

standards:
  substitution-test: true
  three-label-test: true
  have-nots: [OB-01, OB-02, OB-03, OB-04, OB-05, OB-06, OB-07, OB-08]
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-harden

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-observe
  events: [agent.start, artifact.created, agent.end]
