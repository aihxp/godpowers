apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: code-cleanup
  category: maintaining
  description: "Refactor without behavior change"

triggers:
  intent-keywords:
    - "refactor"
    - "clean up"
    - "rename"
    - "extract"
    - "restructure"

sequences:
  default:
    description: "Refactor without behavior change"
    steps:
      - command: "/god-refactor"
        why: "Strict TDD, behavior-preserving, gradual rollout"

default-sequence: default
