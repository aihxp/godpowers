apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-defer-current-milestone
  category: feature-addition
  description: "Defer feature to end of current milestone"

triggers:
  intent-keywords:
    - "defer feature"
    - "finish milestone first"
    - "after current"

sequences:
  default:
    description: "Defer feature to end of current milestone"
    steps:
      - command: "/god-add-backlog "<feature description>""
        why: "Capture without disrupting current work"

default-sequence: default
