apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: extract-learnings
  category: knowledge
  description: "Capture institutional knowledge after a milestone"

triggers:
  intent-keywords:
    - "lessons learned"
    - "extract learnings"
    - "milestone done"
    - "capture knowledge"

sequences:
  default:
    description: "Capture institutional knowledge after a milestone"
    steps:
      - command: "/god-extract-learnings"
        why: "Decisions, lessons, patterns, surprises"

default-sequence: default
