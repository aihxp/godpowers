apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: incident-postmortem
  category: production
  description: "Incident resolved, need investigation"

triggers:
  intent-keywords:
    - "postmortem"
    - "after incident"
    - "rca"
    - "class of bug"
  state-conditions:
    - "lifecycle-phase == post-incident-pending"

sequences:
  default:
    description: "Incident resolved, need investigation"
    steps:
      - command: "/god-postmortem"
        why: "Required within 48h of hotfix"

default-sequence: default
