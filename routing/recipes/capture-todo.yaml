apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: capture-todo
  category: knowledge
  description: "Capture as a real todo with priority"

triggers:
  intent-keywords:
    - "todo"
    - "remind me"
    - "add task"

sequences:
  default:
    description: "Capture as a real todo with priority"
    steps:
      - command: "/god-add-todo "<task>" --priority=<P0/P1/P2>"
        why: "Tracked, routable to a workflow"

default-sequence: default
