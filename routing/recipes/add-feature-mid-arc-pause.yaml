apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-mid-arc-pause
  category: feature-addition
  description: "Bigger feature mid-arc; reconcile with roadmap, pause arc, do feature, update roadmap, resume"

triggers:
  intent-keywords:
    - "mid arc"
    - "mid development"
    - "pause arc"
    - "feature during build"
  state-conditions:
    - "lifecycle-phase == in-arc"

sequences:
  default:
    description: "Bigger feature mid-arc; reconcile with roadmap, pause arc, do feature, update roadmap, resume"
    steps:
      - command: "/god-roadmap-check"
        why: "Reconcile against ROADMAP.md before doing feature work"
      - command: "/god-pause-work"
        why: "Save current arc state"
        skip-when: roadmap-says-already-done-or-prereq
      - command: "/god-feature"
        why: "Run feature workflow with full discipline"
      - command: "/god-roadmap-update"
        why: "Reflect the new feature in ROADMAP.md"
      - command: "/god-resume-work"
        why: "Restore arc state"

default-sequence: default
