apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: monthly-deps
  category: maintaining
  description: "Monthly dependency audit and update"

triggers:
  intent-keywords:
    - "update dependencies"
    - "monthly deps"
    - "audit deps"
    - "cve check"

sequences:
  default:
    description: "Monthly dependency audit and update"
    steps:
      - command: "/god-update-deps"
        why: "Critical CVEs first, batched patches, per-package minors"

default-sequence: default
