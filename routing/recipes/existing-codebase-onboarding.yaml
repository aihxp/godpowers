apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: existing-codebase-onboarding
  category: starting
  description: "Joining or inheriting an existing codebase"

triggers:
  intent-keywords:
    - "existing codebase"
    - "inherit code"
    - "joining project"
    - "mode b"
    - "gap fill"
  state-conditions:
    - "no-godpowers-dir"
    - "has-package-json"

sequences:
  default:
    description: "Joining or inheriting an existing codebase"
    steps:
      - command: "/god-map-codebase"
        why: "4 parallel mappers analyze tech, arch, quality, concerns"
      - command: "/god-init"
        why: "Mode B detection from existing artifacts"
      - command: "/god-status"
        why: "See what tiers are imported vs missing"
      - command: "/god-next"
        why: "Suggests the first missing tier"

default-sequence: default
