apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: multi-repo-suite
  category: suite
  description: "Multi-repo workspace coordination (Mode D)"

triggers:
  intent-keywords:
    - "multi-repo"
    - "monorepo of repos"
    - "suite of repos"
    - "coordinate across repos"
    - "byte-identical files"
    - "share configs across repos"
    - "release coordinated across repos"
    - "mode d"
  state-conditions:
    - "file:.godpowers/suite-config.yaml"

sequences:
  default:
    description: "Status check on registered suite"
    steps:
      - command: "/god-suite-status"
        why: "Aggregate report across all repos"
  init:
    description: "First-time suite registration"
    steps:
      - command: "/god-suite-init"
        why: "Register siblings and standards"
      - command: "/god-suite-status"
        why: "Verify registration"
  release:
    description: "Coordinated release"
    steps:
      - command: "/god-suite-status"
        why: "Confirm clean state"
      - command: "/god-suite-release"
        why: "Bump and propagate"
  patch:
    description: "Cross-repo coordinated change"
    steps:
      - command: "/god-suite-status"
        why: "Verify all repos clean"
      - command: "/god-suite-patch"
        why: "Apply across siblings"
      - command: "/god-suite-status"
        why: "Verify aggregate outcome"
  byte-sync:
    description: "Resolve byte-identical drift"
    steps:
      - command: "/god-suite-sync"
        why: "Pick canonical version, propagate"

default-sequence: default
