apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-parallel
  category: feature-addition
  description: "Parallel feature, do not disrupt main work"

triggers:
  intent-keywords:
    - "parallel feature"
    - "parallel work"
    - "isolated branch"

sequences:
  default:
    description: "Parallel feature, do not disrupt main work"
    steps:
      - command: "/god-workstream new <feature-name>"
        why: "Isolated git worktree + state"
      - command: "/god-feature"
        why: "Runs on the workstream"
      - command: "/god-workstream merge <feature-name>"
        why: "Merge back when done"

default-sequence: default
