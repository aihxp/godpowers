apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: greenfield-with-ideation
  category: starting
  description: "Idea is fuzzy; explore first, then init and build"

triggers:
  intent-keywords:
    - "fuzzy idea"
    - "not sure"
    - "think first"
    - "multiple ideas"
    - "brainstorm"
  state-conditions:
    - "no-godpowers-dir"

sequences:
  default:
    description: "Idea is fuzzy; explore first, then init and build"
    steps:
      - command: "/god-explore"
        why: "Pre-init Socratic ideation"
      - command: "/god-init"
        why: "Commit to clarified framing"
      - command: "/god-mode"
        why: "Run autonomous arc"

default-sequence: default
