apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-future-conditional
  category: feature-addition
  description: "Feature needed in 6+ months, conditional on a trigger"

triggers:
  intent-keywords:
    - "future feature"
    - "when team grows"
    - "conditional on"

sequences:
  default:
    description: "Feature needed in 6+ months, conditional on a trigger"
    steps:
      - command: "/god-plant-seed "<idea> when <trigger condition>""
        why: "Dormant until trigger fires"

default-sequence: default
