apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-prd-update
  category: feature-addition
  description: "Feature requires PRD-level requirement update"

triggers:
  intent-keywords:
    - "update prd"
    - "change requirement"
    - "prd missing"

sequences:
  default:
    description: "Feature requires PRD-level requirement update"
    steps:
      - command: "/god-redo prd"
        why: "Re-run PRD; downstream tiers re-validate"

default-sequence: default
