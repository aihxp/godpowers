apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: capture-idea
  category: knowledge
  description: "Mid-flow idea, want to capture without disrupting"

triggers:
  intent-keywords:
    - "note"
    - "capture"
    - "remember this"
    - "quick note"

sequences:
  default:
    description: "Mid-flow idea, want to capture without disrupting"
    steps:
      - command: "/god-note "<idea>""
        why: "Zero-ceremony capture"

default-sequence: default
