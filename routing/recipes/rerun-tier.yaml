apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: rerun-tier
  category: recovering
  description: "Re-run a specific tier"

triggers:
  intent-keywords:
    - "rerun"
    - "redo tier"
    - "run again"

sequences:
  default:
    description: "Re-run a specific tier"
    steps:
      - command: "/god-redo <tier>"
        why: "Marks tier in-flight; downstream tiers also marked"

default-sequence: default
