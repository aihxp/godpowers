apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: add-feature-next-milestone
  category: feature-addition
  description: "Big feature, want it in next milestone (rebuild roadmap)"

triggers:
  intent-keywords:
    - "next milestone"
    - "rebuild roadmap"
    - "big feature later"

sequences:
  default:
    description: "Big feature, want it in next milestone (rebuild roadmap)"
    steps:
      - command: "/god-add-backlog "<feature>""
        why: "Capture intent"
      - command: "/god-redo roadmap"
        why: "Regenerate with feature included"

default-sequence: default
