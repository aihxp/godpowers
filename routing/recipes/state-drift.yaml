apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: state-drift
  category: recovering
  description: "State seems out of sync with disk"

triggers:
  intent-keywords:
    - "state drift"
    - "state mismatch"
    - "progress wrong"

sequences:
  default:
    description: "State seems out of sync with disk"
    steps:
      - command: "/god-repair"
        why: "Detects and fixes drift between state.json and disk"

default-sequence: default
