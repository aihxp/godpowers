apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: clean-pr
  category: collaborating
  description: "Create PR without exposing .godpowers/"

triggers:
  intent-keywords:
    - "pr branch"
    - "clean pr"
    - "filter planning"

sequences:
  default:
    description: "Create PR without exposing .godpowers/"
    steps:
      - command: "/god-pr-branch"
        why: "Filter .godpowers/ commits from PR branch"

default-sequence: default
