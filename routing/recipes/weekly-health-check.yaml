apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: weekly-health-check
  category: maintaining
  description: "Weekly composite health check"

triggers:
  intent-keywords:
    - "weekly check"
    - "health check"
    - "hygiene"
    - "project health"
  state-conditions:
    - "lifecycle-phase == steady-state-active"

sequences:
  default:
    description: "Weekly composite health check"
    steps:
      - command: "/god-hygiene"
        why: "Audit + deps + docs in one composite report"

default-sequence: default
