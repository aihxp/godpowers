apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: greenfield-manual
  category: starting
  description: "Greenfield with manual control through each step"

triggers:
  intent-keywords:
    - "step by step"
    - "manual"
    - "control each step"
  state-conditions:
    - "no-godpowers-dir"

sequences:
  default:
    description: "Greenfield with manual control through each step"
    steps:
      - command: "/god-init"
      - command: "/god-prd"
      - command: "/god-arch"
      - command: "/god-roadmap"
      - command: "/god-stack"
      - command: "/god-repo"
      - command: "/god-build"
      - command: "/god-deploy"
      - command: "/god-observe"
      - command: "/god-harden"
      - command: "/god-launch"

default-sequence: default
