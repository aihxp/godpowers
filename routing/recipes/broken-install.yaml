apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: broken-install
  category: recovering
  description: "Install seems broken or state is impossible"

triggers:
  intent-keywords:
    - "install broken"
    - "doctor"
    - "diagnose"
    - "something wrong"

sequences:
  default:
    description: "Install seems broken or state is impossible"
    steps:
      - command: "/god-doctor"
        why: "Diagnose install + state, suggest fixes"

default-sequence: default
