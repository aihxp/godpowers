apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: undo-last
  category: recovering
  description: "Undo the last operation"

triggers:
  intent-keywords:
    - "undo"
    - "revert last"
    - "rollback last"

sequences:
  default:
    description: "Undo the last operation"
    steps:
      - command: "/god-undo"
        why: "Reflog-based revert; files moved to .trash/"

default-sequence: default
