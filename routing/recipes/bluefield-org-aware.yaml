apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: bluefield-org-aware
  category: starting
  description: "New project in an established org; respect org standards"

triggers:
  intent-keywords:
    - "bluefield"
    - "new service"
    - "org standards"
    - "shared platform"
    - "within organization"

sequences:
  default:
    description: "New project in an established org; respect org standards"
    steps:
      - command: "/god-org-context init"
        why: "Capture org-level standards and constraints"
      - command: "/god-preflight"
        why: "Inspect inherited context before project-run readiness and pillars"
      - command: "/god-init"
        why: "Detect bluefield mode"
      - command: "/god-mode --bluefield"
        why: "Arc constrained by org context"

default-sequence: default
