apiVersion: godpowers/v1
kind: Recipe
metadata:
  name: parallel-engineers
  category: collaborating
  description: "Two engineers working on parallel features"

triggers:
  intent-keywords:
    - "team work"
    - "parallel engineers"
    - "two features"
    - "independent work"

sequences:
  default:
    description: "Two engineers working on parallel features"
    steps:
      - command: "/god-workstream new <feature>"
        why: "Each engineer gets isolated workstream"
      - command: "/god-feature"
        why: "Build the feature in the workstream"
      - command: "/god-workstream merge <feature>"
        why: "Merge back when ready"

default-sequence: default
