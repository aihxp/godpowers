apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-explore
  description: Pre-init Socratic ideation
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [god-explorer]
  context: fresh
  writes:
    - .godpowers/explore/<slug>.md


success-path:
  next-recommended: /god-init

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-explore
  events: [agent.start, artifact.created, agent.end]
