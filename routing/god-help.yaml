apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-help
  description: Discoverable contextual help
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [built-in]
  context: fresh
  writes:
    []


success-path:
  next-recommended: varies

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-help
  events: [agent.start, artifact.created, agent.end]
