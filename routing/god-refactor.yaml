apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-refactor
  description: Safe refactor with TDD
  tier: 0

prerequisites:
  required:
    - check: state:tier-2.repo.status == done
      auto-complete: /god-add-tests
      human-required: true
    - check: tests-exist-on-affected-surface
      auto-complete: /god-add-tests
      human-required: true

execution:
  spawns: [god-explorer]
  context: fresh
  secondary-spawns: [god-auditor, god-planner, god-executor, god-spec-reviewer, god-quality-reviewer]
  writes:
    []


success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-refactor
  events: [agent.start, artifact.created, agent.end]
