apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-suite-init
  description: Register a multi-repo suite (Mode D)
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [god-coordinator]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-suite-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-suite-init
  events: [agent.start, agent.end]
