apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-logs
  description: 
  tier: 0
  family: operate
  trigger-precedence:
    - trigger: what happened
      prefer: /god-postmortem
      when: post-incident-pending
      fallback: /god-logs
      reason: Incident follow-up takes precedence over run history.

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: varies
  outcome:
    type: contextual
    label: Context-specific next route
    reason: The next route depends on current disk state, command arguments, or user choice.
    allowed-next: [/god-status, /god-next, /god-help]

failure-path:
  on-error: /god-doctor

endoff:
  state-update: none
  events: [agent.start, agent.end]
