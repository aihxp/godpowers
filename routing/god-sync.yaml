apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-sync
  description: Sync all affected artifacts after feature work
  tier: 0

prerequisites:
  required:
    - check: file:.godpowers/PROGRESS.md
      auto-complete: /god-init
      human-required: true

execution:
  spawns: [god-updater]
  context: fresh
  secondary-spawns: [god-pm, god-architect, god-roadmap-updater, god-harden-auditor]
  writes:
    - any updated artifacts (PRD, ARCH, ROADMAP, STACK, etc.)
    - .godpowers/SYNC-LOG.md (append-only)

standards:
  gate-on-failure: pause-for-user

success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier statuses updated based on what was synced
  events: [artifact.updated, have-nots.check, agent.end]
