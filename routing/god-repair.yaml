apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-repair
  description: Fix detected drift
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [built-in]
  context: fresh
  writes:
    []


success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-repair
  events: [agent.start, artifact.created, agent.end]
