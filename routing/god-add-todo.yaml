apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-add-todo
  description: Capture a todo from current context
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-next

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-add-todo
  events: [agent.start, agent.end]
