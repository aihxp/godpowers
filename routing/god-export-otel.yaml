apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-export-otel
  description: Export Godpowers events to OpenTelemetry OTLP JSON traces
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: none
  events: [agent.start, agent.end]
