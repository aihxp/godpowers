apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-org-context
  description: Set up or read org-level standards (bluefield)
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [god-org-context-loader]
  context: fresh
  writes:
    - .godpowers/org-context.yaml

success-path:
  next-recommended: /god-init
  alternatives:
    - command: /god-mode
      when: ready-to-start-bluefield-arc

failure-path:
  on-error: /god-doctor

endoff:
  state-update: org-context loaded
  events: [agent.start, artifact.created, agent.end]
