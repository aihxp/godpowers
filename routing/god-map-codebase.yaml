apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-map-codebase
  description: Parallel codebase analysis with mappers
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [built-in]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-intel

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-map-codebase
  events: [agent.start, agent.end]
