apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-quick
  description: Small task with TDD
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [god-planner]
  context: fresh
  secondary-spawns: [god-executor, god-spec-reviewer, god-quality-reviewer]
  writes:
    []


success-path:
  next-recommended: /god-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-quick
  events: [agent.start, artifact.created, agent.end]
