apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-standards
  description: Artifact standards check (substitution/three-label/have-nots)
  tier: 0

prerequisites:
  required: []

execution:
  spawns: [god-standards-check]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-next

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-standards
  events: [agent.start, agent.end]
