apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-next
  description: Suggest next command
  tier: 0

prerequisites:
  required:
    []

execution:
  spawns: [built-in]
  context: fresh
  reads:
    - .godpowers/prep/INITIAL-FINDINGS.md
    - .godpowers/prep/IMPORTED-CONTEXT.md
  writes:
    []


success-path:
  next-recommended: varies

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-0 updated for /god-next
  events: [agent.start, artifact.created, agent.end]
