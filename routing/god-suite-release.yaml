apiVersion: godpowers/v1
kind: CommandRouting
metadata:
  command: /god-suite-release
  description: Coordinate release across suite siblings
  tier: 3

prerequisites:
  required:
    - .godpowers/suite/suite.yaml

execution:
  spawns: [god-coordinator]
  context: fresh
  writes: []

success-path:
  next-recommended: /god-suite-status

failure-path:
  on-error: /god-doctor

endoff:
  state-update: tier-3 updated for /god-suite-release
  events: [agent.start, agent.end]
