# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: docs-arc
  version: 1.0.0
  description: |
    Verify and update documentation against code.
    Run by /god-docs.

on: [/god-docs]

jobs:
  mechanical-doc-sync:
    tier: 0
    uses: god-orchestrator@^1.0.0
    local-helpers:
      - repo-doc-sync
      - repo-surface-sync
      - host-capabilities
    with:
      action: local-helper-sync
      scope: docs-and-repo-surface

  docs-update:
    tier: 1
    needs: mechanical-doc-sync
    uses: god-docs-writer@^1.0.0
    with:
      template: DOCS-UPDATE-LOG.md

  docs-closure:
    tier: 0
    needs: docs-update
    uses: god-orchestrator@^1.0.0
    local-helpers:
      - checkpoint-sync
      - pillars-sync-plan
    with:
      action: docs-closeout
      dashboard: action-brief
