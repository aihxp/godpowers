# STATUS: NOT YET AUTHORITATIVE
# The orchestrator agent's prose (agents/god-orchestrator.md) drives runtime
# behavior. This YAML is documentation of intent for the v0.14 workflow-runtime
# release. Reading code: trust the orchestrator. Authoring workflows: edit
# both this file AND the orchestrator until v0.14 lands.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: hygiene
  version: 1.0.0
  description: |
    Composite health check: artifact audit + dependency audit + docs verification.
    Periodic check for steady-state projects.
    Run by /god-hygiene.

on: [/god-hygiene]

jobs:
  hygiene-audit:
    tier: 0
    uses: god-auditor@^1.0.0
    with:
      mode: full-audit

  hygiene-deps:
    tier: 0
    uses: god-deps-auditor@^1.0.0
    with:
      mode: audit-only

  hygiene-docs:
    tier: 0
    uses: god-docs-writer@^1.0.0
    with:
      mode: verify-only

  hygiene-report:
    tier: 0
    needs: [hygiene-audit, hygiene-deps, hygiene-docs]
    uses: god-orchestrator@^1.0.0
    with:
      action: compose-hygiene-report
      output: .godpowers/HYGIENE-REPORT.md
