# STATUS: NOT YET AUTHORITATIVE
# The orchestrator agent's prose (agents/god-orchestrator.md) drives runtime
# behavior. This YAML is documentation of intent for the v0.14 workflow-runtime
# release. Reading code: trust the orchestrator. Authoring workflows: edit
# both this file AND the orchestrator until v0.14 lands.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: deps-audit
  version: 1.0.0
  description: |
    Audit and update dependencies. Critical CVEs first, batched patches,
    per-package minor updates, majors deferred to /god-upgrade.
    Run by /god-update-deps.

on: [/god-update-deps]

jobs:
  deps-audit-scan:
    tier: 0
    uses: god-deps-auditor@^1.0.0
    with:
      template: DEPS-AUDIT.md

  deps-patch-batch:
    tier: 2
    needs: deps-audit-scan
    uses: god-executor@^1.0.0
    with:
      mode: batch-patch-updates
    review:
      stages:
        - uses: god-quality-reviewer@^1.0.0
    on-pass: commit-atomic

  deps-minor-per-package:
    tier: 2
    needs: deps-audit-scan
    uses: god-executor@^1.0.0
    with:
      mode: per-package-minor
    per: slice
    review:
      stages:
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    on-pass: commit-atomic

  deps-major-handoff:
    tier: 0
    needs: deps-audit-scan
    uses: god-orchestrator@^1.0.0
    with:
      action: route-to
      target: /god-upgrade
      per: major-version-bump
