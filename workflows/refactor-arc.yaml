# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: refactor-arc
  version: 1.0.0
  description: |
    Safe refactor with strict TDD. No behavior change.
    Run by /god-refactor.

on: [/god-refactor]

jobs:
  refactor-scope:
    tier: 1
    uses: god-explorer@^1.0.0
    with:
      mode: refactor-scoping

  refactor-coverage-check:
    tier: 2
    needs: refactor-scope
    uses: god-auditor@^1.0.0
    with:
      mode: test-coverage-on-affected-surface
    blocks-on:
      - insufficient-coverage: pause

  refactor-plan:
    tier: 2
    needs: refactor-coverage-check
    uses: god-planner@^1.0.0
    with:
      mode: refactor-slices

  refactor-execute:
    tier: 2
    needs: refactor-plan
    uses: god-executor@^1.0.0
    with:
      mode: behavior-preserving
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
          on-fail: rollback
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    on-pass: commit-atomic

  refactor-deploy:
    tier: 3
    needs: refactor-execute
    uses: god-deploy-engineer@^1.0.0
    with:
      mode: gradual-rollout

  refactor-sync:
    tier: 0
    needs: refactor-deploy
    uses: god-orchestrator@^1.0.0
    local-helpers:
      - source-sync-back
      - repo-doc-sync
      - repo-surface-sync
      - checkpoint-sync
      - pillars-sync-plan
    with:
      action: final-sync
      dashboard: action-brief
