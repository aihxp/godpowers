# STATUS: NOT YET AUTHORITATIVE
# The orchestrator agent's prose (agents/god-orchestrator.md) drives runtime
# behavior. This YAML is documentation of intent for the v0.14 workflow-runtime
# release. Reading code: trust the orchestrator. Authoring workflows: edit
# both this file AND the orchestrator until v0.14 lands.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: postmortem
  version: 1.0.0
  description: |
    Post-incident investigation. Builds timeline, identifies root cause and
    class-of-bug, produces blameless action items.
    Run by /god-postmortem.

on: [/god-postmortem]

jobs:
  postmortem-investigate:
    tier: 3
    uses: god-incident-investigator@^1.0.0
    with:
      template: POSTMORTEM.md

  postmortem-runbook-update:
    tier: 3
    needs: postmortem-investigate
    uses: god-docs-writer@^1.0.0
    with:
      mode: runbook-updates
    skip-when: no-runbook-gaps-identified
