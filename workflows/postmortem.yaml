# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: postmortem
  version: 1.0.0
  description: |
    Post-incident investigation. Builds timeline, identifies root cause and
    class-of-bug, produces blameless action items.
    Run by /god-postmortem.

on: [/god-postmortem]

jobs:
  postmortem-investigate:
    tier: 3
    uses: god-incident-investigator@^1.0.0
    with:
      template: POSTMORTEM.md

  postmortem-runbook-update:
    tier: 3
    needs: postmortem-investigate
    uses: god-docs-writer@^1.0.0
    with:
      mode: runbook-updates
    skip-when: no-runbook-gaps-identified

  postmortem-sync:
    tier: 0
    needs: postmortem-runbook-update
    uses: god-orchestrator@^1.0.0
    local-helpers:
      - repo-doc-sync
      - repo-surface-sync
      - checkpoint-sync
      - pillars-sync-plan
    with:
      action: final-sync
      dashboard: action-brief
