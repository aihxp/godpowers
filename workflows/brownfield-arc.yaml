# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: brownfield-arc
  version: 1.1.0
  description: |
    Brownfield: existing codebase, understand before changing. Archaeology +
    reconstruction + debt assessment + greenfield simulation audit, then
    proceed with normal arc workflows.

on: [/god-brownfield, /god-mode --brownfield]

jobs:
  archaeology:
    tier: 0
    uses: god-archaeologist@^1.0.0

  reconstruct:
    tier: 1
    needs: archaeology
    uses: god-reconstructor@^1.0.0

  debt-assess:
    tier: 0
    needs: archaeology
    uses: god-debt-assessor@^1.0.0

  audit:
    tier: 0
    needs: [reconstruct, debt-assess]
    uses: god-auditor@^1.0.0
    with:
      mode: full-audit-on-reconstructed

  greenfield-simulation-audit:
    tier: 0
    needs: audit
    uses: god-auditor@^1.0.0
    with:
      mode: greenfield-simulation
      compare: existing-codebase-to-canonical-godpowers-arc
      output: .godpowers/audit/GREENFIELD-SIMULATION.md

  steady-state-handoff:
    tier: 0
    needs: greenfield-simulation-audit
    uses: god-orchestrator@^1.0.0
    with:
      action: brownfield-to-steady
