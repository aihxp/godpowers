# STATUS: NOT YET AUTHORITATIVE
# The orchestrator agent's prose (agents/god-orchestrator.md) drives runtime
# behavior. This YAML is documentation of intent for the v0.14 workflow-runtime
# release. Reading code: trust the orchestrator. Authoring workflows: edit
# both this file AND the orchestrator until v0.14 lands.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: hotfix-arc
  version: 1.0.0
  description: |
    Urgent production bug fix. Skips planning. Forces postmortem after.
    Run by /god-hotfix.

on: [/god-hotfix]

jobs:
  hotfix-debug:
    tier: 2
    uses: god-debugger@^1.0.0
    with:
      time-box: 30m
      mode: hotfix

  hotfix-fix:
    tier: 2
    needs: hotfix-debug
    uses: god-executor@^1.0.0
    with:
      mode: minimal-fix
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
          on-fail: rollback
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    on-pass: commit-atomic

  hotfix-deploy:
    tier: 3
    needs: hotfix-fix
    uses: god-deploy-engineer@^1.0.0
    with:
      mode: expedited

  hotfix-verify:
    tier: 3
    needs: hotfix-deploy
    uses: god-observability-engineer@^1.0.0
    with:
      mode: verify-symptom-resolved

  hotfix-postmortem-trigger:
    tier: 3
    needs: hotfix-verify
    uses: god-orchestrator@^1.0.0
    with:
      action: schedule-postmortem
      due: 48h
