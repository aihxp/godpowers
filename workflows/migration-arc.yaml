# STATUS: Authoritative (v0.14+). Read by lib/workflow-runner.js for plan
# computation. The orchestrator agent (agents/god-orchestrator.md) dispatches
# the agents in the order this file specifies. To preview without running,
# use `/god-mode --workflow=<name> --plan`.
#
apiVersion: godpowers/v1
kind: Workflow
metadata:
  name: migration-arc
  version: 1.0.0
  description: |
    Framework or version migration. Expand-contract pattern with
    metric-gated slice progression.
    Run by /god-upgrade.

on: [/god-upgrade]

jobs:
  migration-strategy:
    tier: 1
    uses: god-migration-strategist@^1.0.0
    with:
      template: MIGRATION.md

  migration-coverage-fill:
    tier: 2
    needs: migration-strategy
    uses: god-planner@^1.0.0
    with:
      mode: test-coverage-fill
    skip-when: coverage-sufficient

  migration-expand:
    tier: 2
    needs: migration-strategy
    uses: god-executor@^1.0.0
    with:
      mode: introduce-new-alongside-old
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
        - uses: god-quality-reviewer@^1.0.0
    on-pass: commit-atomic

  migration-slices:
    tier: 2
    needs: migration-expand
    uses: god-executor@^1.0.0
    with:
      mode: per-slice
      gradual-rollout: 1-10-50-100
    per: slice
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
          on-fail: rollback
        - uses: god-quality-reviewer@^1.0.0
          on-fail: rollback
    blocks-on:
      - metric-regression: rollback-this-slice

  migration-contract:
    tier: 2
    needs: migration-slices
    uses: god-executor@^1.0.0
    with:
      mode: remove-old-path
    review:
      stages:
        - uses: god-spec-reviewer@^1.0.0
        - uses: god-quality-reviewer@^1.0.0
    on-pass: commit-atomic
    skip-when: not-100pct-migrated
